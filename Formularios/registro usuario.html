<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FIMACOR | Registro de Usuario</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-y: auto; /* ✅ Permite desplazarse verticalmente */
    }

    .registro-container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      width: 440px;
      padding: 40px 30px;
      text-align: center;
      margin: 40px 0; /* ✅ Espaciado arriba y abajo */
    }

    .logo {
      width: 100px;
      height: 100px;
      margin-bottom: 10px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h2 {
      color: #2E7D32;
      font-size: 1.6em;
      margin-bottom: 20px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      color: #2E7D32;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #E0F2F1;
      border-radius: 10px;
      font-size: 15px;
      background: #FAFAFA;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #1B5E20;
      box-shadow: 0 0 6px rgba(30,120,60,0.12);
      background: #fff;
    }

    .btn {
      width: 100%;
      background: #2E7D32;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 6px;
    }

    .btn:hover {
      background: #1B5E20;
    }

    .extra-options {
      margin-top: 16px;
      font-size: 14px;
      color: #444;
    }

    .extra-options a {
      color: #2E7D32;
      text-decoration: none;
      font-weight: 700;
    }

    .extra-options a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 480px) {
      .registro-container {
        width: 92%;
        padding: 30px 18px;
        margin: 20px 0;
      }
    }
  </style>
</head>
<body>
  <div class="registro-container">
    <div class="logo">
      <img src="imagenes/sena.png" alt="Logo SENA">
    </div>
    <h2>Registro de Usuario</h2>

    <form action="#" method="post" aria-label="Formulario de registro de usuario">

      <div class="input-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
      </div>

      <div class="input-group">
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido" required>
      </div>

      <div class="input-group">
        <label for="telefono">Número de teléfono</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej: 3001234567" required>
      </div>

      <div class="input-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="input-group">
        <label for="documento">Tipo de documento</label>
        <select id="documento" name="documento" required>
          <option value="">Seleccione...</option>
          <option value="CC">Cédula de Ciudadanía</option>
          <option value="TI">Tarjeta de Identidad</option>
          <option value="CE">Cédula de Extranjería</option>
        </select>
      </div>

      <div class="input-group">
        <label for="rol">Rol</label>
        <select id="rol" name="rol" required>
          <option value="">Seleccione un rol...</option>
          <option value="Administrador">Administrador</option>
          <option value="Usuario">Usuario</option>
        </select>
      </div>

      <div class="input-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña" required>
      </div>

      <div class="input-group">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" name="confirmar" placeholder="Repita su contraseña" required>
      </div>

      <button type="submit" class="btn">Registrar Usuario</button>

      <div class="extra-options">
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
      </div>
    </form>

    <footer>© 2025 FIMACOR - Sistema de Control de Máquinas</footer>
  </div>
</body>
</html>
