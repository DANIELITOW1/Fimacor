<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIMACOR | Recuperar Contraseña</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .form-container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 450px;
      padding: 40px;
      text-align: center;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin-bottom: 15px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h2 {
      color: #2E7D32;
      font-size: 1.8em;
      margin-bottom: 15px;
    }

    p {
      color: #555;
      font-size: 0.95em;
      margin-bottom: 25px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      color: #2E7D32;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #E0F2F1;
      border-radius: 10px;
      font-size: 15px;
      background: #FAFAFA;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: #1B5E20;
      box-shadow: 0 0 6px rgba(30,120,60,0.12);
      background: #fff;
    }

    .btn {
      width: 100%;
      background: #2E7D32;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #1B5E20;
    }

    .extra-options {
      margin-top: 16px;
      font-size: 14px;
    }

    .extra-options a {
      color: #2E7D32;
      text-decoration: none;
      font-weight: 600;
    }

    .extra-options a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="logo">
      <img src="imagenes/sena.png" alt="Logo SENA">
    </div>

    <h2>Recuperar Contraseña</h2>
    <p>Ingresa tu correo electrónico registrado para recibir un enlace o código de recuperación.</p>

    <form action="#" method="post" aria-label="Formulario de recuperación de contraseña">
      <div class="input-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="usuario@correo.com" required>
      </div>

      <button type="submit" class="btn">Enviar enlace de recuperación</button>

      <div class="extra-options">
        <p><a href="Login.html">← Volver al inicio de sesión</a></p>
      </div>
    </form>

    <footer>© 2025 FIMACOR – Sistema de Control de Máquinas Textiles | CMTC - SENA</footer>
  </div>
</body>
</html>
