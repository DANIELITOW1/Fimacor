<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FIMACOR | Iniciar Sesión</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: #0d5028;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      width: 380px;
      padding: 40px 30px;
      text-align: center;
    }

    .logo {
      display: inline-block;
      width: 100px;
      height: 100px;
      margin-bottom: 15px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    h2 {
      color: #2E7D32;
      font-size: 1.6em;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      color: #116616;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 2px solid #265e28;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #0a6611;
      box-shadow: 0 0 5px #14881c;
    }

    .btn {
      width: 100%;
      background: #327935;
      color: #f3eeee;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1B5E20;
    }

    .extra-options {
      margin-top: 20px;
      font-size: 14px;
    }

    .extra-options a {
      color: #2E7D32;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .extra-options a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 25px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="imagenes/sena.png" alt="Logo SENA">
    </div>

    <h2>Bienvenido a FIMACOR</h2>

    <form action="#" method="post">
      <div class="input-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="input-group">
        <label for="contraseña">Contraseña</label>
        <input type="password" id="contraseña" name="contraseña" placeholder="Ingrese su contraseña" required>
      </div>
      
      <div class="button">
      <button type="submit" class="btn">
      <p>Iniciar Sesion</button></p>
      </div>

      <div class="extra-options">
        <p>¿No tienes cuenta? <a href="Rejistro usuario.html">Regístrate aquí</a></p>
        <p><a href="Olvide contraseña.html">¿Olvidaste tu contraseña?</a></p>
      </div>
    </form>

    <footer>© 2025 FIMACOR - Sistema de Control de Máquinas Textiles</footer>
  </div>
</body>
</html>
